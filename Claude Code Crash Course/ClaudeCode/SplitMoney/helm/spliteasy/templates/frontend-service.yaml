apiVersion: v1
kind: Service
metadata:
  name: {{ include "spliteasy.frontendName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "spliteasy.labels" . | nindent 4 }}
    {{- include "spliteasy.frontendSelectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "spliteasy.frontendSelectorLabels" . | nindent 4 }}
