apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spliteasy.frontendName" . }}-nginx
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "spliteasy.labels" . | nindent 4 }}
    {{- include "spliteasy.frontendSelectorLabels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Strip /api prefix and proxy to the backend ClusterIP service
        location /api/ {
            proxy_pass http://{{ include "spliteasy.backendName" . }}:{{ .Values.backend.port }}/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
        gzip_min_length 256;
    }
